{% extends 'base.html' %}
{% load static %}

{% block title %}Action Failed | MealMate Pro{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/fail.css' %}">
{% endblock %}

{% block content %}
<div class="status-wrapper">
    <div class="status-card error-card">
        <div class="status-icon error-icon">
            <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        </div>
        
        <h1 class="status-title">Action <span>Failed</span></h1>
        <p class="status-message">Something went wrong or your credentials were incorrect. Please double-check and try again.</p>
        
        <div class="action-area">
            <a href="{% url 'open_signin' %}" class="btn-retry">Try Again</a>
            <button onclick="history.back()" class="btn-back">Go Back</button>
        </div>
    </div>
</div>
{% endblock %}
