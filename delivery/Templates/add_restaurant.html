{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/add_restaurant.css' %}">
{% endblock %}

{% block content %}
<div class="form-page">

    <div class="form-card">
        <div class="form-header">
            <h2>Add New <span>Partner</span></h2>
            <p>Enter restaurant details to initialize on the network.</p>
        </div>

        <form action="{% url 'add_restaurant' %}" method="POST" class="pro-form">
            {% csrf_token %}
            
            <div class="input-group">
                <label for="id_name">Restaurant Name</label>
                <input type="text" id="id_name" name="name" placeholder="e.g. Empire Restaurant" required>
            </div>

            <div class="input-group">
                <label for="id_picture">Picture URL</label>
                <input type="url" id="id_picture" name="picture" placeholder="https://image-link.com/photo.jpg" required>
            </div>

            <div class="input-group">
                <label for="id_cuisine">Cuisine Type</label>
                <input type="text" id="id_cuisine" name="cuisine" placeholder="e.g. North Indian, Chinese" required>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label for="id_rating">Rating (0 - 5)</label>
                    <input type="number" id="id_rating" name="rating" min="0" max="5" step="0.1" placeholder="4.5" required>
                </div>
            </div>

            <button type="submit" class="submit-btn">
                Confirm & Add Restaurant
            </button>
        </form>
    </div>
</div>
{% endblock %}
