{% extends 'base.html' %}
{% load static %}

{% block title %}Sign In - MealMate Pro{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/signin.css' %}">
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h2 class="auth-title">Welcome Back</h2>
        <p class="auth-subtitle">Sign in to continue your delicious journey</p>

        <form action="{% url 'signin' %}" method="post" class="auth-form">
            {% csrf_token %}
            
            <div class="input-group">
                <label for="username">Username</label>
                <div class="input-field-wrap">
                    <svg class="input-icon" aria-hidden="true" focusable="false" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <div class="input-field-wrap">
                    <svg class="input-icon" aria-hidden="true" focusable="false" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
            </div>

            <button type="submit" class="btn-primary w-100">SIGN IN</button>
        </form>
        
        <p class="auth-footer">Don't have an account? <a href="{% url 'open_signup' %}" class="auth-link">Register here</a></p>
    </div>
</div>
{% endblock %}
